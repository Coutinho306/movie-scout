# Calibration grid — embedding / chunk / embed_text recipe ONLY (small sample).
# Retrieval knobs (hybrid/query_rewrite) are NOT swept here; they're
# calibrated post-B on the full corpus (they don't re-embed). See the spike.
#
# Each variant maps to a disposable calib_ collection ingested separately via
# `run_experiment --golden-sample`. Variant strings must match Settings.variant_suffix.
top_k: [5, 10]
variant:
  - "calib_3small_c300o50_keywords"    # round-1 winner (baseline)
  - "calib_3large_c300o50_keywords"    # API upper bound
  - "calib_bgesmall_c300o50_keywords"  # free-tier challenger (replaces minilm)
  - "calib_3small_c150o30_keywords"    # chunk sweep: smaller (reviews only; movie metrics expected flat)
  - "calib_3small_c600o100_keywords"   # chunk sweep: larger
hybrid: [false]
query_rewrite: [false]
