apiVersion: 1

datasources:
  - name: MovieScoutPostgres
    uid: moviescout-pg
    type: postgres
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1500
    isDefault: true
    editable: true
